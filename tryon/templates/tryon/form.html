<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jewellery Try‑On</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>Try On Jewellery</h1>
    <form method="post" enctype="multipart/form-data" class="row g-3">
        {% csrf_token %}
        <div class="mb-3">
            <label for="face_image">Face Image</label>
            <input type="file" name="face_image" id="face_image" accept="image/*" required class="form-control">
        </div>
        <div class="mb-3">
            <label for="jewellery_image">Jewellery Image (PNG with transparent background)</label>
            <input type="file" name="jewellery_image" id="jewellery_image" accept="image/png" required class="form-control">
        </div>
        <div class="mb-3">
            <label for="jewellery_type">Jewellery Type</label>
            <select name="jewellery_type" id="jewellery_type" required class="form-select">
                <option value="earring">Earring</option>
                <option value="nose">Nose Ring</option>
                <option value="necklace">Necklace</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Try On</button>
    </form>
</div>
</body>
</html>
